yamlname: Daily Site Refresh

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  daily-refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily timestamp
        run: |
          DATE=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
          echo "{\"last_updated\": \"$DATE\", \"day\": $(date +%j)}" > daily.json
