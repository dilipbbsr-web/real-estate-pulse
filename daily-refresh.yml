name: Daily Site Refresh

on:
  schedule:
    # Runs every day at 6:00 AM IST (00:30 UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  daily-refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily timestamp
        run: |
          DATE=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
          echo "{\"last_updated\": \"$DATE\", \"day\": $(date +%j)}" > daily.json
          echo "Daily refresh triggered: $DATE"

      - name: Commit and push
        run: |
          git config --global user.name "Real Estate Pulse Bot"
          git config --global user.email "actions@realestatepulse.in"
          git add daily.json
          git diff --staged --quiet || git commit -m "chore: daily refresh $(TZ='Asia/Kolkata' date '+%d %b %Y')"
          git push
